name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o stock-server ./main.go

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /opt/stock

      - name: Upload binary to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "stock-server"
          target: "/opt/stock/"

      - name: Restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/stock

            # 停止旧进程
            if [ -f stock.pid ]; then
              OLD_PID=$(cat stock.pid)
              if kill -0 "$OLD_PID" 2>/dev/null; then
                kill "$OLD_PID"
                sleep 2
              fi
              rm -f stock.pid
            fi

            # 赋予执行权限并启动新进程
            chmod +x stock-server
            nohup ./stock-server > stock.log 2>&1 &
            echo $! > stock.pid

            sleep 2
            if kill -0 "$(cat stock.pid)" 2>/dev/null; then
              echo "✅ Service started successfully (PID: $(cat stock.pid))"
            else
              echo "❌ Service failed to start"
              cat stock.log
              exit 1
            fi
